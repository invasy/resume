  sections:
    summary:
      - Software engineer (C++/Qt, Scala, Python) with over 10 years of experience in enterprise services development.
      - Development automation specialist with a vast CI/CD and DevOps expertise.
      - Collaborating with distributed teams in different software development stages.
      - Constantly improving skills with new technologies and instruments.
      - Passionate about efficiency and performance.
      - GNU/Linux and FOSS enthusiast.
    experience:
      - company: NGENIX
        position: Senior Software Engineer
        location: Moscow, Russia (_remote_)
        start_date: '2023-06-19'
        end_date:
        highlights: []
        summary: "**Tech stack**: Python, Flask, FastAPI, OpenAPI, Connexion, SQLAlchemy, PostgreSQL, ClickHouse, Kubernetes."
      - company: M.Video-Eldorardo
        position: Lead Software Engineer
        location: Moscow, Russia (_remote_)
        start_date: '2021-12-01'
        end_date: '2022-09-30'
        highlights:
          - Analyzed requirements and implemented architecture for new microservices.
          - Collaborated with agile team, managed to enhance service robustness.
          - Facilitated internal developers meetings to share ideas and knowledge.
        summary: "**Tech stack**: Scala, Akka, Lagom, Cassandra, Elastic Stack, SAP, GitLab CI, Kubernetes, microservices."
      - company: Rostelecom IT
        position: Senior Software Engineer
        location: Perm, Russia
        start_date: '2019-01-09'
        end_date: '2021-12-31'
        highlights:
          - Developed high performance event-driven payment service with C++,
            Qt, CEF, OpenShift.
          - Boosted service performance by redesigning event queues.
          - Organized and implemented CI/CD pipelines to decrease deployment
            time from days to minutes.
          - Initiated migration to blue-green deployment with extensive load
            testing.
          - Planned tasks and facilitated meetings with distributed agile team.
          - Redesigned documentation and knowledge base structure, saved hours
            of searching for answers.
        summary: "**Tech stack**: C++, Qt, CEF, Scala, Oracle, GitLabCI, Tomcat,
          OpenShift, JMeter, Gatling."
      - company: Perm State University
        position: Research Engineer
        location: Perm, Russia
        start_date: '2018-05-10'
        end_date: '2018-12-31'
        highlights:
          - Participated in research and development project for
            _UEC-Aviadvigatel_ funded by Russian Foundation for Basic Research.
          - Project result is a turbine engine computational aerodynamics model
            based on a proprietary numerical solver of Navier-Stokes equations.
        summary: "**Tech stack**: C++, Fortran 90, CUDA, OpenMP, OpenMPI, OpenHPC, RHEL,
          Ganglia."
      - company: Stream (MTS)
        position: Software Engineer
        location: Perm, Russia
        start_date: '2017-12-01'
        end_date: '2018-05-04'
        highlights:
          - Developed in-house high performance service using C++, STL, Boost,
            Qt that allowed clients to commit payment transactions and view
            fiscal data.
          - Optimized event matching algorithms to decrease server load by 21%
            on average.
        summary: "**Tech stack**: C++, STL, Boost, CMake."
      - company: Perm State University
        position: Chief of Laboratory and Research Engineer
        location: Perm, Russia
        start_date: '2012-10-01'
        end_date: '2017-12-01'
        highlights:
          - Researched and developed HPC applications (fluid mechanics,
            aerodynamics, linguistics).
          - Tasks, projects, and people management.
          - HPC clusters administration and maintenance.
          - Popularization of science, public lectures, science events and
            festivals.
        summary: "**Tech stack**: C++, Fortran90, OpenMP, OpenMPI CUDA, Hadoop, Perl, Ruby on Rails, Redmine, RHEL."
    education:
